name: Collect Data & Deploy

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e ".[dev]"

      - run: pytest -v

      - name: Collect data from Banco Central
        env:
          BCENTRAL_USER: ${{ secrets.BCENTRAL_USER }}
          BCENTRAL_PASS: ${{ secrets.BCENTRAL_PASS }}
        run: python -m chile_balance collect

      - name: Build static site
        run: python -m chile_balance build

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update data $(date -u +%Y-%m-%d)"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - id: deploy
        uses: actions/deploy-pages@v4
